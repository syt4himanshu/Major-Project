services:
  # Backend API Service
  - type: web
    name: pds-backend
    runtime: node
    region: oregon
    plan: free
    rootDir: pds-backend
    buildCommand: npm install && npm run migrate:up
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5055
      - key: HOST
        value: 0.0.0.0
      - key: DATABASE_URL
        fromDatabase:
          name: pds-database
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: CORS_ALLOW_ALL_DEV_ORIGINS
        value: false
      - key: JWT_SECRET
        generateValue: true
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_SERVICE_SID
        sync: false
    healthCheckPath: /api/admin/test

  # Frontend Static Site
  - type: web
    name: pds-frontend
    runtime: static
    region: oregon
    plan: free
    rootDir: pds-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: pds-database
    databaseName: pds_production
    user: pds_user
    plan: free
    region: oregon
